<!DOCTYPE html>
<!--
  DES2026 WhatsApp Prototype — IDC School of Design, IIT Bombay

  SETUP:
  1. Push to GitHub repo, enable GitHub Pages on main branch
  2. Visit https://ryutwome.github.io/DES2026/ on Android Chrome
  3. Enter Anthropic API key + Cloudflare Worker URL on first launch
  4. Install via "Add to Home Screen"

  CLOUDFLARE WORKER (free tier, ~10 lines):
  ─────────────────────────────────────────
  export default {
    async fetch(request) {
      if (request.method === 'OPTIONS') return new Response(null, {headers:{
        'Access-Control-Allow-Origin':'*',
        'Access-Control-Allow-Methods':'POST,OPTIONS',
        'Access-Control-Allow-Headers':'Content-Type'}});
      const {apiKey,...body} = await request.json();
      const r = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify(body)});
      const d = await r.json();
      return new Response(JSON.stringify(d),{headers:{'Content-Type':'application/json','Access-Control-Allow-Origin':'*'}});
    }
  };
  ─────────────────────────────────────────
-->
